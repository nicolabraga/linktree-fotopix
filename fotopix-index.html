<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3" />
  <title>Fotopix — Fotografia Esportiva</title>
  <meta name="description" content="Fotopix — Fotografia Esportiva em Fortaleza. Encontre suas fotos aqui." />
  <meta property="og:title" content="Fotopix — Fotografia Esportiva" />
  <meta property="og:image" content="https://d2hk32cswy6zx7.cloudfront.net/fotografos/v2_0209fcb8-2704-4e84-96d2-c66adaf2e85a.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="links-data.js" onerror="loadRemote()"></script>
  <script>
    function loadRemote() {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/gh/Nicolabraga/linktree-fotopix@main/links-data.js';
      s.onload = function() { if (typeof render === 'function') render(); };
      document.head.appendChild(s);
    }
  </script>
  <style>
    :root {
      --bg:        #080c14;
      --bg2:       #0e1420;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --text:      #f0f4ff;
      --muted:     #7a8aaa;
      --brand:     #00d4aa;
      --brand-dim: rgba(0,212,170,0.15);

      --c-blue:    #2979ff;
      --c-blue-g:  linear-gradient(135deg,#1a56db,#2979ff);
      --c-orange:  #ff6b35;
      --c-orange-g:linear-gradient(135deg,#d4380d,#ff6b35);
      --c-green:   #00c073;
      --c-green-g: linear-gradient(135deg,#00875a,#00c073);
      --c-gold:    #f5a623;
      --c-gold-g:  linear-gradient(135deg,#c47d0e,#f5a623);
      --c-purple:  #9c6eff;
      --c-purple-g:linear-gradient(135deg,#6c3fb5,#9c6eff);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 16px 64px;
      overflow-x: hidden;
    }

    /* ── Background orbs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,212,170,0.12), transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(41,121,255,0.1), transparent 70%);
      bottom: 100px; right: -80px;
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 48px;
    }

    /* ── HERO ── */
    .hero {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; margin-bottom: 32px; text-align: center;
    }

    .logo-ring {
      position: relative; width: 88px; height: 88px;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--brand), #2979ff, var(--brand));
      animation: spin 6s linear infinite;
    }
    .logo-ring img {
      position: relative; z-index: 1;
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bg);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hero-name {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--brand));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-bio {
      font-size: 0.875rem; color: var(--muted); line-height: 1.65;
      max-width: 300px;
    }

    /* ── STATS strip ── */
    .stats {
      display: flex; gap: 8px; width: 100%; margin-bottom: 24px;
    }
    .stat-pill {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      gap: 2px;
    }
    .stat-num { font-size: 1.1rem; font-weight: 700; color: var(--brand); }
    .stat-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* ── WhatsApp CTA ── */
    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 20px; border-radius: 16px;
      background: linear-gradient(135deg, #128c7e, #25d366, #128c7e);
      background-size: 200% 100%; background-position: 0% 0;
      color: #fff; text-decoration: none; font-size: 1rem; font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 32px rgba(37,211,102,0.28);
      transition: background-position 0.4s ease, transform 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 28px;
      animation: pulsewa 3s ease-in-out infinite;
    }
    @keyframes pulsewa {
      0%,100% { box-shadow: 0 8px 32px rgba(37,211,102,0.28); }
      50%      { box-shadow: 0 8px 48px rgba(37,211,102,0.48); }
    }
    .btn-wa:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(37,211,102,0.4);
    }
    .btn-wa svg { flex-shrink: 0; }

    /* ── Section header ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 14px;
    }
    .section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.16em; color: var(--muted);
    }
    .section-meta { display: flex; align-items: center; gap: 8px; }
    .updated-tag {
      font-size: 0.65rem; color: rgba(122,138,170,0.6);
      background: var(--surface); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 20px;
    }
    .btn-refresh {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; font-weight: 600;
      padding: 5px 10px; border-radius: 20px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; font-family: inherit;
    }
    .btn-refresh:hover { border-color: var(--brand); color: var(--brand); }
    .btn-refresh:disabled { opacity: 0.4; cursor: default; }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .spinning .ri { display: inline-block; animation: rotate 0.6s linear infinite; }

    /* ── LINKS ── */
    .links { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .link-card {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; border-radius: 16px;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      animation: cardIn 0.4s ease both;
      overflow: hidden; position: relative;
    }
    .link-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent, var(--brand));
    }
    .link-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 60%, rgba(255,255,255,0.02));
      pointer-events: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .link-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.07);
    }

    .card-icon {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      background: var(--icon-bg, rgba(0,212,170,0.12));
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 0.88rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-date { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .badge-novo {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 20px;
      color: #000; background: var(--brand);
      animation: shinebadge 2.5s ease-in-out infinite;
    }
    @keyframes shinebadge {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0); }
      50%      { box-shadow: 0 0 8px 3px rgba(0,212,170,0.4); }
    }

    .card-arrow { color: rgba(255,255,255,0.2); }

    /* Category colors */
    .cat-tarde   { --accent: var(--c-orange); --icon-bg: rgba(255,107,53,0.12); }
    .cat-morning { --accent: var(--c-blue);   --icon-bg: rgba(41,121,255,0.12); }
    .cat-nature  { --accent: var(--c-green);  --icon-bg: rgba(0,192,115,0.12); }
    .cat-event   { --accent: var(--c-gold);   --icon-bg: rgba(245,166,35,0.12); }
    .cat-special { --accent: var(--c-purple); --icon-bg: rgba(156,110,255,0.12); }

    /* ── Footer ── */
    .footer {
      margin-top: 40px; display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    .social-links { display: flex; gap: 16px; }
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .social-btn:hover { border-color: var(--brand); color: var(--brand); }
    .footer-brand {
      font-size: 0.7rem; color: rgba(122,138,170,0.4);
      display: flex; align-items: center; gap: 5px;
    }
    .footer-brand a { color: rgba(0,212,170,0.5); text-decoration: none; }
    .footer-brand a:hover { color: var(--brand); }
  </style>
</head>

  <!-- Section header -->

<script>
  const CHEVRON = `<svg class="card-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`;

  function getCategory(t) {
    const s = t.toLowerCase();
    if (s.includes('tarde') || s.includes('noite'))              return 'tarde';
    if (s.includes('sabiaguaba') || s.includes('ibiratemi'))      return 'nature';
    if (/triathlon|desafio|vertical|sprint/i.test(s))             return 'special';
    if (/corrida|maratona|run|track|circuito|sesc|terra|peter|vozao|sun day|pague menos|polic|choqueano|sesi/i.test(s)) return 'event';
    return 'morning';
  }

  function getIcon(cat, title) {
    const t = title.toLowerCase();
    if (cat === 'tarde')   return '🌆';
    if (cat === 'nature')  return t.includes('ibiratemi') ? '🌳' : '🚴';
    if (cat === 'special') return '🏊';
    if (cat === 'event')   return '🏃';
    return '🌅';
  }

  function extractDate(text) {
    const m = text.match(/(\d{2})[\/]{1,2}(\d{2})[\/]{1,2}(\d{4})/);
    return m ? `${m[1]}/${m[2]}/${m[3]}` : '';
  }

  function stripDate(text) {
    return text.replace(/\s*[-–]\s*\d{2}[\/]{1,2}\d{2}[\/]{1,2}\d{4}/, '').replace(/\s*-\s*$/, '').trim();
  }

  function render() {
    const container = document.getElementById('linksContainer');
    if (!window.LINKS_DATA || !window.LINKS_DATA.links || !window.LINKS_DATA.links.length) {
      container.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:0.875rem;">
        <div style="font-size:2rem;margin-bottom:12px;">📂</div>
        Nenhum álbum carregado ainda.</div>`;
      return;
    }

    const data = window.LINKS_DATA;
    const links = data.links;

    if (data.updated_at) {
      document.getElementById('updatedAt').textContent = data.updated_at;
      const timePart = data.updated_at.split(' ')[1] || data.updated_at;
      document.getElementById('statUpdate').textContent = timePart;
    }

    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const filtered = links.filter(({ text }) => {
      const m = text.match(/(\d{2})[\/](\d{2})[\/](\d{4})/);
      if (!m) return false;
      const d = new Date(+m[3], +m[2] - 1, +m[1]);
      return d >= sevenDaysAgo;
    });

    document.getElementById('statAlbuns').textContent = filtered.length;
    document.getElementById('statsStrip').style.display = 'flex';

    container.innerHTML = filtered.map(({ href, text }, i) => {
      const cat   = getCategory(text);
      const icon  = getIcon(cat, text);
      const date  = extractDate(text);
      const title = stripDate(text);
      const isNew = i < 5;
      const delay = Math.min(i * 0.05, 1);
      return `
        <a class="link-card cat-${cat}" href="${href}" target="_blank" rel="noopener" style="animation-delay:${delay}s">
          <div class="card-icon">${icon}</div>
          <div class="card-body">
            <div class="card-title">${title}</div>
            ${date ? `<div class="card-date">${date}</div>` : ''}
          </div>
          <div class="card-right">
            ${isNew ? '<span class="badge-novo">novo</span>' : ''}
            ${CHEVRON}
          </div>
        </a>`;
    }).join('');
  }

  async function hardRefresh() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    btn.classList.add('spinning');
    try {
      if ('caches' in window) {
        const keys = await caches.keys().catch(() => []);
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (_) {}
    const url = new URL(location.href);
    url.searchParams.set('v', Date.now());
    location.replace(url.toString());
  }

  if (window.LINKS_DATA) render();
</script>
</body>
