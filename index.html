<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3" />
  <title>Fotopix - Fotografia Esportiva</title>
  <meta name="description" content="Fotopix - Fotografia Esportiva. Aqui tratamos com qualidade, sonhos! Suas fotos você encontra aqui." />
  <meta property="og:title" content="Fotopix - Fotografia Esportiva" />
  <meta property="og:image" content="https://d2hk32cswy6zx7.cloudfront.net/fotografos/v2_0209fcb8-2704-4e84-96d2-c66adaf2e85a.jpg" />
  <script src="links-data.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #d4f0e7; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 36px 16px 56px; }
    .container { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; }
    .profile { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; text-align: center; }
    .logo-wrap { margin-bottom: 4px; }
    .logo-wrap img { width: 120px; height: auto; }
    .profile h1 { font-size: 1.1rem; font-weight: 700; color: #2d7a5e; }
    .bio-lines { font-size: 0.9rem; color: #4a7c6a; line-height: 1.6; text-align: center; }
    .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background: #00e632; border: 2.5px solid #111; color: #111; text-decoration: none; font-size: 1rem; font-weight: 800; padding: 16px 24px; border-radius: 14px; width: 100%; margin-bottom: 12px; transition: opacity 0.18s, transform 0.1s; box-shadow: 3px 3px 0 #111; }
    .btn-whatsapp:hover { opacity: 0.92; transform: translateY(-1px); }
    .section-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin: 8px 0 10px; }
    .section-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.14em; color: #2d7a5e; }
    .section-meta { display: flex; align-items: center; gap: 8px; }
    .updated-at { font-size: 0.65rem; color: #7ab09a; }
    .btn-refresh { display: flex; align-items: center; gap: 5px; background: #fff; border: 1.5px solid #2d7a5e; color: #2d7a5e; font-size: 0.75rem; font-weight: 700; padding: 5px 11px; border-radius: 20px; cursor: pointer; transition: background 0.18s, color 0.18s; font-family: inherit; }
    .btn-refresh:hover { background: #2d7a5e; color: #fff; }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon { display: inline-block; }
    .spinning .spin-icon { animation: spin 0.6s linear infinite; }
    .links { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .link-btn { display: block; background: #1565c0; border: none; color: #fff; text-decoration: none; padding: 16px 20px; border-radius: 14px; font-size: 0.92rem; font-weight: 700; text-align: center; transition: filter 0.15s, transform 0.1s; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .link-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .link-btn.tarde { background: #c62828; }
    .link-btn.nature { background: #2e7d32; }
    .link-btn.event { background: #00695c; }
    .link-btn.special { background: #6a1b9a; }
    .footer { margin-top: 28px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .powered { font-size: 0.7rem; color: #7ab09a; }
    .powered a { color: #2d7a5e; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <div class="profile">
    <div class="logo-wrap">
      <img src="https://d2hk32cswy6zx7.cloudfront.net/fotografos/v2_62873ec3-a5f3-4141-afde-af6d72fc205d.jpg" alt="FotoPix" />
    </div>
    <h1>Fotopix - Fotografia Esportiva</h1>
    <div class="bio-lines">Aqui tratamos com qualidade, sonhos!<br>Suas fotos você encontra aqui 👇</div>
  </div>
  <a class="btn-whatsapp" href="https://chat.whatsapp.com/DKN5T3EguFgIU9tonK9Pxn" target="_blank" rel="noopener">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.761-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Receba os links
  </a>
  <div class="section-header">
    <span class="section-label">Álbuns recentes</span>
    <div class="section-meta">
      <span class="updated-at" id="updatedAt"></span>
      <button class="btn-refresh" id="btnRefresh" onclick="hardRefresh()">
        <span class="spin-icon" id="spinIcon">↺</span> Atualizar
      </button>
    </div>
  </div>
  <div class="links" id="linksContainer"></div>
  <div class="footer">
    <div class="powered">fotos em <a href="https://fotopix.com.br" target="_blank" rel="noopener">fotopix.com.br</a></div>
  </div>
</div>
<script>
  function getClass(t) {
    t = t.toLowerCase();
    if (t.includes('tarde') || t.includes('noite')) return 'tarde';
    if (t.includes('sabiaguaba') || t.includes('ibiratemi')) return 'nature';
    if (/triathlon|desafio|vertical|sprint/i.test(t)) return 'special';
    if (/corrida|maratona|run|track|circuito|sesc|cabra|choqueano|polic|sesi|terra da luz|peter pan|vozao|sun day|pague menos/i.test(t)) return 'event';
    return '';
  }
  function render() {
    const container = document.getElementById('linksContainer');
    if (!window.LINKS_DATA || !window.LINKS_DATA.links || !window.LINKS_DATA.links.length) {
      container.innerHTML = '<div style="text-align:center;padding:32px;color:#4a7c6a;">Nenhum link carregado.</div>';
      return;
    }
    if (window.LINKS_DATA.updated_at) document.getElementById('updatedAt').textContent = window.LINKS_DATA.updated_at;
    container.innerHTML = window.LINKS_DATA.links.slice(0, 30).map(({ href, text }) => {
      const cls = getClass(text);
      return '<a class="link-btn' + (cls ? ' ' + cls : '') + '" href="' + href + '" target="_blank" rel="noopener">' + text + '</a>';
    }).join('');
  }
  async function hardRefresh() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true; btn.classList.add('spinning');
    try { if ('caches' in window) { const keys = await caches.keys().catch(()=>[]); await Promise.all(keys.map(k=>caches.delete(k))); } } catch(_) {}
    const url = new URL(location.href); url.searchParams.set('v', Date.now()); location.replace(url.toString());
  }
  render();
</script>
</body>
</html>
