    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

    .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }

    /* ── Profile ── */
    .profile { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 4px; text-align: center; }

    .avatar-ring {
      width: 96px; height: 96px; border-radius: 50%; padding: 3px;
      background: conic-gradient(#f59e0b, #ef4444, #f59e0b, #fbbf24, #f59e0b);
      margin-bottom: 4px;
    }
    .avatar-ring img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
      border: 2px solid #0a0a0a; display: block;
    }

    .profile h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }

    .bio-lines { display: flex; flex-direction: column; gap: 4px; font-size: 0.83rem; color: #ccc; line-height: 1.5; }
    .bio-lines a { color: #f59e0b; text-decoration: none; font-weight: 500; }
    .bio-lines a:hover { text-decoration: underline; }

    .divider { width: 100%; height: 1px; background: #222; margin: 20px 0; }

    /* ── WhatsApp ── */
    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, #25D366, #1ebe5a);
      color: #fff; text-decoration: none; font-size: 0.95rem; font-weight: 700;
      padding: 15px 24px; border-radius: 12px; width: 100%; margin-bottom: 28px;
      box-shadow: 0 4px 20px #25d36630;
      transition: opacity 0.18s, transform 0.1s;
    }
    .btn-whatsapp:hover { opacity: 0.92; transform: translateY(-1px); }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 12px; }
    .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: #555; }
    .section-meta { display: flex; align-items: center; gap: 8px; }
    .updated-at { font-size: 0.65rem; color: #333; }

    .btn-refresh {
      display: flex; align-items: center; gap: 5px;
      background: #1a1a1a; border: 1px solid #2e2e2e; color: #aaa;
      font-size: 0.75rem; font-weight: 600; padding: 5px 11px; border-radius: 20px;
      cursor: pointer; transition: background 0.18s, color 0.18s, border-color 0.18s;
      font-family: inherit;

    .btn-refresh:hover { background: #242424; border-color: #3a3a3a; color: #fff; }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon { display: inline-block; }
    .spinning .spin-icon { animation: spin 0.6s linear infinite; }

    /* ── Album cards ── */
    .links { display: flex; flex-direction: column; gap: 7px; width: 100%; }

    .link-btn {
      display: flex; align-items: center; gap: 12px;

      transition: background 0.16s, border-color 0.16s, transform 0.1s;

    .link-btn:hover { background: #1c1c1c; border-color: #2a2a2a; transform: translateY(-1px); }

<script>
  // ── Analytics ──
  function trackLink(label) {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'link_click', {
        'event_category': 'linktree',
        'event_label': label
      });
    }
  }

  const chevron = `<svg class="link-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`;

  function getIcon(t) {
    t = t.toLowerCase();
    if (t.includes('sabiaguaba'))                            return '🚴';
    if (t.includes('tarde') || t.includes('noite'))          return '🌆';
    if (t.includes('beira mar'))                             return '🌊';
    if (t.includes('lagoa') || t.includes('rio de janeiro')) return '🚣';
    if (/corrida|maratona|run|sesi|terra da luz|track|polic/i.test(t)) return '🏃';
    return '📸';
  }

  function isNew(index) {
    return index < 5;
  }

  function extractDate(text) {
    const m = text.match(/(\d{2})[\/]{1,2}(\d{2})[\/]{1,2}(\d{4})/);
    return m ? `${m[1]}/${m[2]}/${m[3]}` : '';
  }

  function stripDate(text) {
    return text.replace(/\s*[-–]\s*\d{2}[\/]{1,2}\d{2}[\/]{1,2}\d{4}/, '').replace(/\s*-\s*$/, '').trim();
  }

  function render() {
    const container = document.getElementById('linksContainer');

    if (!window.LINKS_DATA || !window.LINKS_DATA.links || !window.LINKS_DATA.links.length) {
      container.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📂</div>
          <p>Nenhum link carregado.<br><br>
          Execute o script para atualizar:<br>
          <code>python3 update_links.py</code></p>
        </div>`;
      return;
    }

    // Show updated at
    if (window.LINKS_DATA.updated_at) {
      document.getElementById('updatedAt').textContent = window.LINKS_DATA.updated_at;
    }

    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    const filtered = window.LINKS_DATA.links.filter(({ text }) => {
      const m = text.match(/(\d{2})[\/](\d{2})[\/](\d{4})/);
      if (!m) return false;
      const d = new Date(+m[3], +m[2] - 1, +m[1]);
      return d >= sevenDaysAgo;
    });

    container.innerHTML = filtered.map(({ href, text }, i) => {
      const icon  = getIcon(text);
      const date  = extractDate(text);
      const title = stripDate(text);
      const novo  = isNew(i);
      return `
        <a class="link-btn" href="${href}" target="_blank" rel="noopener" onclick="trackLink('${title.replace(/'/g, "\\'")}')">
          <div class="link-icon">${icon}</div>
          <div class="link-body">
            <div class="link-title">${title}</div>
            ${date ? `<div class="link-date">${date}</div>` : ''}
          </div>
          <div class="link-right">
            ${novo ? '<span class="badge-novo">novo</span>' : ''}
            ${chevron}
          </div>
        </a>`;
    }).join('');
  }

  async function hardRefresh() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    btn.classList.add('spinning');

    // Clear all browser caches
    try {
      if ('caches' in window) {
        const keys = await caches.keys().catch(() => []);
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations().catch(() => []);
        await Promise.all(regs.map(r => r.unregister()));
      }
    } catch (_) {}

    // Reload bypassing cache — links-data.js will be reloaded fresh
    const url = new URL(location.href);
    url.searchParams.set('v', Date.now());
    location.replace(url.toString());
  }

  render();

  function copyPix(btn) {
    const key = 'd38eda0f-0370-4bce-8823-95020e4b2d8e';
    navigator.clipboard.writeText(key).then(() => {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '📋 Copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
